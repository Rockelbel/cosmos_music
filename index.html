<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COSMOS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%23003333' stroke-width='8'/><circle cx='50' cy='50' r='20' fill='%23003333'/></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #020205; --primary: #8a2be2; --primary-glow: #b26bf5; --accent: #00ffff; --text-main: #ffffff; --text-dim: rgba(255, 255, 255, 0.5); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Rajdhani', sans-serif; color: var(--text-main); height: 100vh; width: 100vw; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .status-bar { padding: 30px 0; text-align: center; cursor: pointer; z-index: 50; width: 100%; }
        .status-label { font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
        .current-config { font-size: 12px; font-weight: 300; color: var(--primary-glow); text-shadow: 0 0 8px var(--primary); padding: 5px 20px; }
        
        /* 响应式容器 */
        .main-layout { display: flex; align-items: center; justify-content: center; width: 95%; max-width: 1400px; flex: 1; transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); perspective: 3000px; transform-style: preserve-3d; min-height: 0; }
        .player-card { width: 420px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); transform-style: preserve-3d; z-index: 2; }
        .lyrics-wrapper { width: 0; height: 500px; opacity: 0; overflow: hidden; transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); transform-style: preserve-3d; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); }
        
        /* PC 端 3D 展开 */
        @media (min-width: 769px) {
            .main-layout.has-lyrics { gap: 100px; }
            .main-layout.has-lyrics .player-card { transform: rotateY(35deg); transform-origin: right center; }
            .main-layout.has-lyrics .lyrics-wrapper { width: 650px; opacity: 1; transform: rotateY(-35deg); transform-origin: left center; }
        }

        /* 移动端全方位自适应 */
        @media (max-width: 768px) {
            .main-layout { position: relative; width: 100%; margin-top: -20px; }
            .player-card { width: 90vw; position: absolute; max-width: 400px; }
            .lyrics-wrapper { width: 90vw !important; position: absolute; height: 55vh; z-index: 1; pointer-events: none; max-width: 400px; }
            
            .cover-container { width: 60vw !important; height: 60vw !important; max-width: 260px; max-height: 260px; margin-bottom: 20px !important; animation: float-cover 4s ease-in-out infinite; }
            .cover-rings { width: 60vw !important; height: 60vw !important; max-width: 260px; max-height: 260px; }
            @keyframes organic-morph {
                0% { width: 60vw; height: 60vw; max-width: 260px; max-height: 260px; opacity: 0; border-color: rgba(0,255,255,0); border-radius: 4px; transform: translate(-50%, -50%) rotate(0deg); box-shadow: 0 0 0 rgba(0,255,255,0); }
                10% { opacity: 0.8; border-color: rgba(0,255,255,0.9); box-shadow: 0 0 20px rgba(0,255,255,0.4); }
                30% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; border-color: rgba(0,255,255,0.8); transform: translate(-50%, -50%) rotate(3deg) skew(2deg, -2deg); }
                50% { width: 85vw; height: 80vw; max-width: 360px; max-height: 340px; border-radius: 30% 70% 60% 40% / 60% 40% 70% 50%; border-color: rgba(138,43,226,0.5); transform: translate(-50%, -50%) rotate(-2deg) skew(-3deg, 3deg); box-shadow: 0 0 30px rgba(138,43,226,0.3); }
                70% { border-radius: 70% 30% 40% 60% / 40% 60% 50% 70%; border-color: rgba(80,150,255,0.4); transform: translate(-50%, -50%) rotate(2deg) skew(1deg, -1deg); }
                100% { width: 110vw; height: 105vw; max-width: 460px; max-height: 440px; opacity: 0; border-color: rgba(0,255,255,0); border-radius: 50% 50% 60% 40% / 50% 50% 40% 60%; transform: translate(-50%, -50%) rotate(0deg) skew(0deg, 0deg); box-shadow: 0 0 60px rgba(138,43,226,0); }
            }
            .song-title { font-size: 22px !important; }
            .artist { font-size: 12px !important; }
            
            /* 移动端激活态 */
            .main-layout.mobile-show-lyrics .player-card { opacity: 0; pointer-events: none; transform: scale(0.9); }
            .main-layout.mobile-show-lyrics .lyrics-wrapper { opacity: 1; pointer-events: all; transform: scale(1); }
            
            /* 调整底部控制台位置，防止重叠 */
            .v7-controls { bottom: 30px !important; gap: 40px !important; }
            .v7-btn { width: 56px !important; height: 56px !important; font-size: 18px !important; }
        }

        .cover-container { position: relative; width: 280px; height: 280px; margin-bottom: 30px; border-radius: 4px; cursor: pointer; background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: float-cover 4s ease-in-out infinite; }
        .cover-container::before { content: ''; position: absolute; inset: -1px; border-radius: 4px; background: linear-gradient(135deg, rgba(0,255,255,0.2) 0%, transparent 50%, rgba(138,43,226,0.2) 100%); z-index: -1; }
        .cover-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; position: relative; z-index: 1; }

        /* 封面播放浮层 - 点击任意处播放并关闭 */
        .cover-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
            border-radius: 4px;
        }
        .cover-play-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .cover-play-overlay .play-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,255,255,0.3);
            pointer-events: none;
        }

        /* 播放按钮 - 暂停时显示 */
        .play-overlay { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; cursor: pointer; opacity: 0; pointer-events: none; transition: all 0.4s ease; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); z-index: 50; }
        .play-overlay.show { opacity: 1; pointer-events: auto; }
        @media (min-width: 769px) { .play-overlay { display: none; } }

        /* Toast提示 */
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 12px 24px; background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,255,0.3); border-radius: 20px; color: var(--accent); font-size: 13px; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 300; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes float-cover { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(1deg); } }
        @keyframes border-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 同心有机波浪边框效果 */
        .cover-rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; pointer-events: none; z-index: 0; }
        .cover-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0,255,255,0.6);
            opacity: 0;
            box-shadow: 0 0 15px rgba(0,255,255,0.3), 0 0 30px rgba(0,255,255,0.1);
        }
        .cover-ring:nth-child(1) { animation: organic-morph 5s ease-in-out infinite; }
        .cover-ring:nth-child(2) { animation: organic-morph 5s ease-in-out infinite 1.6s; }
        .cover-ring:nth-child(3) { animation: organic-morph 5s ease-in-out infinite 3.2s; }
        @keyframes organic-morph {
            0% {
                width: 280px; height: 280px;
                opacity: 0;
                border-color: rgba(0,255,255,0);
                border-radius: 4px;
                transform: translate(-50%, -50%) rotate(0deg);
                box-shadow: 0 0 0 rgba(0,255,255,0);
            }
            10% {
                opacity: 0.8;
                border-color: rgba(0,255,255,0.9);
                box-shadow: 0 0 20px rgba(0,255,255,0.4), 0 0 40px rgba(0,255,255,0.2);
            }
            30% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                border-color: rgba(0,255,255,0.8);
                transform: translate(-50%, -50%) rotate(3deg) skew(2deg, -2deg);
            }
            50% {
                width: 380px; height: 360px;
                border-radius: 30% 70% 60% 40% / 60% 40% 70% 50%;
                border-color: rgba(138,43,226,0.5);
                transform: translate(-50%, -50%) rotate(-2deg) skew(-3deg, 3deg);
                box-shadow: 0 0 30px rgba(138,43,226,0.3), 0 0 60px rgba(138,43,226,0.1);
            }
            70% {
                border-radius: 70% 30% 40% 60% / 40% 60% 50% 70%;
                border-color: rgba(80,150,255,0.4);
                transform: translate(-50%, -50%) rotate(2deg) skew(1deg, -1deg);
            }
            100% {
                width: 480px; height: 460px;
                opacity: 0;
                border-color: rgba(0,255,255,0);
                border-radius: 50% 50% 60% 40% / 50% 50% 40% 60%;
                transform: translate(-50%, -50%) rotate(0deg) skew(0deg, 0deg);
                box-shadow: 0 0 60px rgba(138,43,226,0), 0 0 100px rgba(138,43,226,0);
            }
        }
        .info-area { text-align: center; width: 100%; margin-bottom: 20px; }
        .song-title { font-size: 28px; font-weight: 700; text-shadow: 0 0 20px rgba(138,43,226,0.5); line-height: 1.2; word-wrap: break-word; color: #fff; }
        .artist { font-size: 13px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; opacity: 0.8; }
        .progress-container { width: 85%; height: 2px; background: rgba(255,255,255,0.08); margin: 20px 0 15px; position: relative; cursor: pointer; }
        .progress-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 20px;
            transform: translateY(-50%);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(0,255,255,0.3), var(--accent), #fff);
            position: relative;
            box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(0,255,255,0.3);
            transition: width 0.1s linear;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), 0 0 30px rgba(0,255,255,0.5);
        }
        .time-display { width: 90%; display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); }

        .lyrics-container { width: 100%; height: 100%; overflow-y: auto; scrollbar-width: none; padding: 250px 0; text-align: center; cursor: pointer; }
        .lyrics-container::-webkit-scrollbar { display: none; }
        .lyric-line { font-size: 19px; line-height: 2.8; color: rgba(255, 255, 255, 0.3); transition: all 0.6s; padding: 0 20px; }
        .lyric-line.active { color: #fff; transform: scale(1.1); text-shadow: 0 0 30px var(--primary); opacity: 1; }

        .v7-controls { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 50px; z-index: 100; }
        .v7-btn { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; cursor: pointer; transition: all 0.3s ease; background: rgba(255,255,255,0.05); box-shadow: 0 0 15px rgba(255,255,255,0.1); -webkit-tap-highlight-color: transparent; }
        .v7-btn.idle { border-color: #444; color: #444; box-shadow: none; }
        .v7-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.1); box-shadow: 0 0 30px var(--primary); }
        .v7-btn:active, .v7-btn.active-tap { border-color: var(--primary); color: var(--primary); transform: scale(0.95); box-shadow: 0 0 30px var(--primary); }

        /* 移动端：隐藏控制按钮 */
        @media (max-width: 768px) {
            .v7-controls { display: none; }
            .main-layout { margin-bottom: 30px; }
        }

        .config-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .config-backdrop.active { opacity: 1; pointer-events: auto; }
        .config-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 8, 0.98); z-index: 200; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1); overflow: hidden; }
        .config-overlay.active { transform: translateY(0); }
        .config-overlay.dragging { transition: none; }
        .overlay-content { height: 100%; display: flex; flex-direction: column; }
        .overlay-title { font-size: 24px; font-weight: 300; text-align: center; padding: 60px 20px 30px; letter-spacing: 8px; color: var(--accent); }
        .tag-groups-scroll { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .tag-group { margin-bottom: 35px; width: 100%; max-width: 800px; margin-inline: auto; }
        .config-section-title { font-size: 11px; color: var(--text-dim); letter-spacing: 4px; margin-bottom: 18px; text-transform: uppercase; text-align: center; font-weight: 400; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .tag-btn { padding: 12px 24px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); color: var(--text-dim); font-size: 14px; transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .tag-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
        .tag-btn.selected { background: rgba(0,255,255,0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px rgba(0,255,255,0.2); }
        .keyword-input { width: calc(100% - 40px); max-width: 600px; margin: 0 auto 30px; display: block; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 16px 24px; color: #fff; font-family: 'Rajdhani'; font-size: 15px; outline: none; text-align: center; }
        .keyword-input:focus { border-color: var(--accent); background: rgba(0,255,255,0.05); }
        .apply-btn-container { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 30px 40px; background: linear-gradient(to top, rgba(5,5,8,0.98) 50%, transparent); }
        .apply-btn { width: 100%; max-width: 300px; margin: 0 auto; display: block; padding: 16px 32px; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 30px; font-size: 14px; font-weight: 400; letter-spacing: 4px; cursor: pointer; transition: all 0.3s; }
        .apply-btn:hover { background: var(--accent); color: #000; }

        @keyframes float-rotate { 0% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(1deg); } 100% { transform: translateY(0) rotate(0deg); } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="play-overlay" id="play-overlay"><i class="fas fa-play"></i></div>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div class="status-bar" id="status-bar"><div class="status-label">COSMOS</div><div class="current-config" id="current-config-text">随机探索</div></div>
        <div class="main-layout" id="main-layout">
            <div class="player-card" id="player-card">
                <div class="cover-container" id="cover-btn-wrapper">
                    <div class="cover-rings">
                        <div class="cover-ring"></div>
                        <div class="cover-ring"></div>
                        <div class="cover-ring"></div>
                    </div>
                    <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=600&q=80" id="cover-img" class="cover-img">
                    <div class="cover-play-overlay" id="cover-play-overlay">
                        <div class="play-icon"><i class="fas fa-play"></i></div>
                    </div>
                </div>
                <div class="info-area"><h1 class="song-title" id="title">初始化中...</h1><div class="artist" id="artist">系统就绪</div></div>
                <div class="progress-container" id="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="time-display"><span id="curr-time">00:00</span><span id="total-time">00:00</span></div>
            </div>
            <div class="lyrics-wrapper" id="lyrics-wrapper"><div class="lyrics-container" id="lyrics-container"></div></div>
        </div>
        <div class="v7-controls">
            <div class="v7-btn" id="v7-play" title="Play/Pause"><i class="fas fa-play" id="v7-play-icon"></i></div>
            <div class="v7-btn" id="v7-next" title="Next Signal"><i class="fas fa-forward"></i></div>
        </div>
    </div>
    <div class="config-backdrop" id="config-backdrop"></div>
    <div class="config-overlay" id="config-overlay">
        <div class="overlay-content">
            <div class="overlay-title">COSMOS</div>
            <div class="tag-groups-scroll">
                <input type="text" id="keyword-input" class="keyword-input" placeholder="搜索关键词" autocomplete="off">
                <div id="tag-groups-container"></div>
            </div>
            <div class="apply-btn-container">
                <button class="apply-btn" id="apply-btn">完成</button>
            </div>
        </div>
    </div>
    <audio id="audio" crossorigin="anonymous"></audio>
    <script id="main-script">
        const API_BASE = 'https://api.i-meto.com/meting/api?server=netease';
        const tagLib = {
            "风格": ["流行", "说唱", "摇滚", "后摇", "电子", "爵士", "古典", "民谣", "金属", "英伦", "波萨诺瓦", "舞曲", "氛围", "R&B", "灵魂乐", "放克", "雷鬼", "拉丁", "国风", "二次元"],
            "心情": ["愉悦", "悲伤", "治愈", "燃", "平静", "浪漫", "孤独", "梦幻", "慵懒", "焦虑", "怀旧", "期待", "迷幻", "暴怒"],
            "场景": ["阅读", "工作", "编程", "运动", "助眠", "驾驶", "看星空", "散步", "咖啡厅", "聚会", "冥想", "洗澡", "旅行"],
            "时段": ["清晨", "上午", "午后", "黄昏", "夜晚", "深夜", "凌晨"]
        };
        const defaultKeywords = tagLib["风格"]; // 默认从风格中随机
        const appState = { keyword: '', selectedTags: {}, mobileLyrics: false };
        const els = { audio: document.getElementById('audio'), title: document.getElementById('title'), artist: document.getElementById('artist'), cover: document.getElementById('cover-img'), playIcon: document.getElementById('v7-play-icon'), progressFill: document.getElementById('progress-fill'), progressTrack: document.getElementById('progress-track'), statusBar: document.getElementById('status-bar'), overlay: document.getElementById('config-overlay'), currentConfigText: document.getElementById('current-config-text'), mainLayout: document.getElementById('main-layout'), lyricsContainer: document.getElementById('lyrics-container'), tagGroups: document.getElementById('tag-groups-container'), v7Play: document.getElementById('v7-play'), v7Next: document.getElementById('v7-next'), coverWrapper: document.getElementById('cover-btn-wrapper') };
        let isLoaded = false, currentLyrics = [], activeLyricIndex = -1;

        const isMobile = () => window.innerWidth <= 768;

        function initTags() {
            els.tagGroups.innerHTML = '';
            for (const [cat, tags] of Object.entries(tagLib)) {
                const group = document.createElement('div'); group.className = 'tag-group';
                group.innerHTML = `<div class="config-section-title">${cat}</div>`;
                const cloud = document.createElement('div'); cloud.className = 'tag-cloud';
                tags.forEach(tag => {
                    const isSelected = appState.selectedTags[cat] === tag;
                    const btn = document.createElement('button'); btn.className = 'tag-btn' + (isSelected ? ' selected' : '');
                    btn.innerText = tag;
                    btn.dataset.category = cat;
                    btn.dataset.tag = tag;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        // 如果点击已选中的，取消选择
                        if (appState.selectedTags[cat] === tag) {
                            delete appState.selectedTags[cat];
                        } else {
                            // 同一类别只能选一个，先清除同类别其他选择
                            appState.selectedTags[cat] = tag;
                        }
                        // 重新渲染以更新选中状态
                        initTags();
                    };
                    cloud.appendChild(btn);
                });
                group.appendChild(cloud); els.tagGroups.appendChild(group);
            }
        }

        // 封面播放浮层 - 点击任意处关闭并播放
        const coverPlayOverlay = document.getElementById('cover-play-overlay');
        function showPlayOverlay() {
            if (window.innerWidth <= 768) {
                coverPlayOverlay.classList.add('show');
            }
        }
        function hidePlayOverlay() {
            coverPlayOverlay.classList.remove('show');
        }
        coverPlayOverlay.onclick = (e) => {
            e.stopPropagation();
            hidePlayOverlay();
            togglePlay();
        };

        // 移动端：点击封面显示播放浮层
        els.coverWrapper.onclick = (e) => {
            if (window.innerWidth <= 768 && els.audio.paused && !coverPlayOverlay.classList.contains('show')) {
                showPlayOverlay();
            }
        };

        // 进度条修复
        els.progressTrack.onclick = (e) => {
            if (!els.audio.duration) return;
            const rect = els.progressTrack.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            els.audio.currentTime = pos * els.audio.duration;
        };

        let idleTimer;
        function resetIdle() { [els.v7Play, els.v7Next].forEach(b => b.classList.remove('idle')); clearTimeout(idleTimer); idleTimer = setTimeout(() => { [els.v7Play, els.v7Next].forEach(b => b.classList.add('idle')); }, 1500); }
        window.onmousemove = resetIdle; window.ontouchstart = resetIdle;

        els.v7Play.onclick = (e) => { e.stopPropagation(); togglePlay(); };
        els.v7Next.onclick = (e) => { e.stopPropagation(); nextTrack(); };

        // 移动端播放按钮点击
        document.getElementById('play-overlay').onclick = (e) => {
            e.stopPropagation();
            togglePlay();
        };

        // 移动端按钮点击状态修复 - 绑定到所有设备
        function setupMobileButton(btn) {
            const removeActive = () => btn.classList.remove('active-tap');

            btn.addEventListener('touchstart', function(e) {
                this.classList.add('active-tap');
            }, {passive: true});

            btn.addEventListener('touchend', function(e) {
                // 150ms后移除，让用户看到反馈
                setTimeout(removeActive, 150);
            }, {passive: true});

            btn.addEventListener('touchcancel', function(e) {
                removeActive();
            }, {passive: true});
        }

        setupMobileButton(els.v7Play);
        setupMobileButton(els.v7Next);

        // 移动端手势系统（仅限移动端）
        let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
        let touchStartTime = 0;
        const SWIPE_THRESHOLD = 50;
        const TAP_THRESHOLD = 200; // ms

        function openConfig() {
            document.getElementById('keyword-input').value = appState.keyword;
            initTags();
            document.getElementById('config-backdrop').classList.add('active');
            els.overlay.classList.add('active');
        }

        function closeConfig() {
            els.overlay.classList.remove('active');
            document.getElementById('config-backdrop').classList.remove('active');
        }

        // 状态栏点击打开设置（桌面端）
        els.statusBar.onclick = () => {
            if (!isMobile()) {
                openConfig();
            }
        };

        // 背景点击关闭
        document.getElementById('config-backdrop').onclick = () => closeConfig();

        // 歌词界面点击或下滑返回首页（仅移动端）
        els.lyricsContainer.onclick = (e) => {
            if (isMobile() && appState.mobileLyrics) {
                e.stopPropagation();
                appState.mobileLyrics = false;
                els.mainLayout.classList.remove('mobile-show-lyrics');
            }
        };

        document.getElementById('keyword-input').onkeydown = (e) => { if (e.key === 'Enter') applyConfig(); };
        document.getElementById('apply-btn').onclick = (e) => { e.stopPropagation(); applyConfig(); closeConfig(); };

        function applyConfig() { appState.keyword = document.getElementById('keyword-input').value.trim(); updateFilterDisplay(); fetchMusic(true); }
        function updateFilterDisplay() {
            let pts = [];
            if (appState.keyword) pts.push(appState.keyword);
            Object.values(appState.selectedTags).forEach(t => pts.push(t));
            els.currentConfigText.innerText = pts.length > 0 ? pts.join(' · ') : "随机探索";
        }

        // 键盘快捷键
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowRight' || e.code === 'ArrowLeft') {
                nextTrack();
            }
        });

        // 移动端全局手势
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchStartTime = Date.now();
        }, {passive: true});

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const touchDuration = Date.now() - touchStartTime;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const absX = Math.abs(deltaX);
            const absY = Math.abs(deltaY);

            // 点击判断
            if (touchDuration < TAP_THRESHOLD && absX < 10 && absY < 10) {
                if (!els.overlay.classList.contains('active') &&
                    document.activeElement.tagName !== 'INPUT' &&
                    window.innerWidth <= 768) {
                    togglePlay();
                }
                return;
            }

            // 滑动判断 - 仅移动端
            if (window.innerWidth > 768) return;

            if (Math.max(absX, absY) > SWIPE_THRESHOLD) {
                if (absX > absY) {
                    // 水平滑动
                    nextTrack();
                } else {
                    // 垂直滑动
                    if (deltaY < 0) {
                        // 上滑 - 打开设置（仅在非歌词界面时）
                        if (!els.overlay.classList.contains('active') && !appState.mobileLyrics) {
                            openConfig();
                        }
                    } else {
                        // 下滑
                        if (els.overlay.classList.contains('active')) {
                            // 设置页面下滑关闭 - 只有在顶部时才关闭
                            const scrollContainer = document.querySelector('.tag-groups-scroll');
                            if (scrollContainer && scrollContainer.scrollTop <= 10) {
                                closeConfig();
                            }
                        } else if (!appState.mobileLyrics) {
                            // 首页下滑打开歌词
                            appState.mobileLyrics = true;
                            els.mainLayout.classList.add('mobile-show-lyrics');
                        }
                        // 歌词界面下滑不做任何操作（不打开设置）
                    }
                }
            }
        }, {passive: true});

        const skippedSongs = new Set();
        let skipCount = 0;
        const MAX_SKIPS = 5;

        els.audio.onloadedmetadata = () => {
            const duration = els.audio.duration;
            if (duration > 0 && duration < 50) {
                skipCount++;
                skippedSongs.add(els.audio.src);

                if (skipCount >= MAX_SKIPS) {
                    skipCount = 0;
                    skippedSongs.clear();
                    currentSongPool = []; // 清空当前结果池，强制换关键词
                    els.title.innerText = "暂无可用音源";
                    els.artist.innerText = "2秒后尝试其他关键词";
                    showToast("该关键词暂无完整音源");
                    setTimeout(() => fetchMusic(true), 2000);
                } else {
                    // 在当前结果池中继续找（不是executeSearch，因为那会换关键词）
                    const validSongs = currentSongPool.filter(s => !skippedSongs.has(s.url));
                    if (validSongs.length > 0) {
                        showToast(`跳过试听版 (${skipCount}/${MAX_SKIPS})`);
                        const randomIdx = Math.floor(Math.random() * validSongs.length);
                        loadTrack(validSongs[randomIdx], true);
                    } else {
                        // 当前关键词的歌都无效，换下一个关键词
                        currentSongPool = [];
                        executeSearch(true);
                    }
                }
            } else {
                skipCount = 0;
            }
        };

        // --- Media Session (移动端锁屏控制) ---
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title, artist: song.author, album: 'COSMOS Explorer',
                    artwork: [{ src: song.pic, sizes: '512x512', type: 'image/jpeg' }]
                });
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
        }

        const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000); camera.position.z = 50;
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false }); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        function createStars(count, size) { const geo = new THREE.BufferGeometry(); const pos = new Float32Array(count * 3); for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5)*400; geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: size, transparent: true, opacity: 0.4 })); }
        const s1 = createStars(800, 0.2), s2 = createStars(400, 0.4); scene.add(s1, s2);
        function animate() { requestAnimationFrame(animate); s1.rotation.y += 0.0003; s2.rotation.y += 0.0005; renderer.render(scene, camera); }
        animate();

        let searchQueue = [];
        let currentSearchIndex = 0;
        let currentSongPool = []; // 当前关键词的搜索结果池
        let currentQuery = ''; // 当前搜索词

        async function fetchMusic(autoPlay = false) {
            if(autoPlay) { els.title.innerText = "SCANNING..."; }
            resetLyricsUI();

            const keywords = [];
            if (appState.keyword) keywords.push(appState.keyword);
            Object.values(appState.selectedTags).forEach(tag => keywords.push(tag));

            // 如果没有关键词，从风格中随机选择一个作为默认
            if (keywords.length === 0) {
                const randomStyle = defaultKeywords[Math.floor(Math.random() * defaultKeywords.length)];
                keywords.push(randomStyle);
            }

            // 构建搜索队列：先搜全部组合，再分别单独搜
            searchQueue = [];

            // 1. 全部关键词组合搜索（最优先）
            if (keywords.length > 1) {
                searchQueue.push(keywords.join(' '));
            }

            // 2. 单独搜索每个关键词
            keywords.forEach(k => searchQueue.push(k));

            // 打乱单独搜索的顺序（除了第一个是组合搜索）
            const combined = searchQueue[0];
            const singles = searchQueue.slice(1);
            singles.sort(() => Math.random() - 0.5);
            searchQueue = [combined, ...singles].filter(Boolean);

            currentSearchIndex = 0;
            skipCount = 0;
            skippedSongs.clear();
            await executeSearch(autoPlay);
        }

        async function executeSearch(autoPlay) {
            // 如果当前还有未尝试的歌曲，继续从中选择
            if (currentSongPool.length > 0) {
                const validSongs = currentSongPool.filter(s => !skippedSongs.has(s.url));
                if (validSongs.length > 0) {
                    const randomIdx = Math.floor(Math.random() * validSongs.length);
                    loadTrack(validSongs[randomIdx], autoPlay);
                    return;
                }
            }

            // 当前关键词的歌曲都无效，尝试下一个关键词
            if (currentSearchIndex >= searchQueue.length) {
                els.title.innerText = "NO VALID SIGNAL";
                els.artist.innerText = "PLEASE TRY AGAIN LATER";
                setTimeout(() => fetchMusic(true), 3000);
                return;
            }

            currentQuery = searchQueue[currentSearchIndex] || '';
            currentSearchIndex++;

            try {
                const res = await fetch(`${API_BASE}&type=search&id=${encodeURIComponent(currentQuery)}`);
                const songs = await res.json();

                if (songs && songs.length) {
                    // 缓存当前搜索结果（取前100首）
                    currentSongPool = songs.slice(0, 100);
                    // 从中随机选择一首
                    const randomIdx = Math.floor(Math.random() * currentSongPool.length);
                    loadTrack(currentSongPool[randomIdx], autoPlay);
                } else {
                    // 当前关键词无结果，尝试下一个
                    currentSongPool = [];
                    await executeSearch(autoPlay);
                }
            } catch(e) {
                console.error(e);
                currentSongPool = [];
                await executeSearch(autoPlay);
            }
        }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function loadTrack(song, autoPlay) {
            els.progressFill.style.width = '0%';
            els.title.innerText = song.title;
            els.artist.innerText = song.author;

            // 封面直接切换，无动画
            els.cover.src = song.pic;

            els.audio.src = song.url;
            isLoaded = true;
            els.lyricsContainer.innerHTML = '同步歌词中...';
            fetchLyrics(song.lrc);
            updateMediaSession(song);
            if(autoPlay) playAudio();
        }
        async function fetchLyrics(url) { try { const res = await fetch(url); const txt = await res.text(); parseLyrics(txt); } catch(e) { resetLyricsUI(); } }
        function parseLyrics(lrc) { currentLyrics = []; const lines = lrc.split('\n'), regex = /\[(\d{2}):(\d{2})[:\.](\d{2,3})\]/; lines.forEach(l => { const m = regex.exec(l); if(m) { const time = parseInt(m[1])*60 + parseInt(m[2]) + parseFloat("0." + m[3]); const txt = l.replace(regex, '').trim(); if(txt && !txt.includes('作词') && !txt.includes('作曲')) currentLyrics.push({time, text: txt}); } }); if(currentLyrics.length) renderLyrics(); else { els.lyricsContainer.innerHTML = '<div class="lyric-line active">暂无歌词</div>'; els.mainLayout.classList.add('has-lyrics'); } }
        function renderLyrics() { els.lyricsContainer.innerHTML = ''; currentLyrics.forEach(l => { const d = document.createElement('div'); d.className = 'lyric-line'; d.innerText = l.text; els.lyricsContainer.appendChild(d); }); els.mainLayout.classList.add('has-lyrics'); els.lyricsContainer.scrollTop = 0; }
        function resetLyricsUI() { if (!isMobile()) els.mainLayout.classList.remove('has-lyrics'); currentLyrics = []; activeLyricIndex = -1; els.lyricsContainer.innerHTML = ''; }
        function togglePlay() { if(!isLoaded) fetchMusic(true); else if(els.audio.paused) playAudio(); else { els.audio.pause(); updatePlayUI(false); } }
        function playAudio() { initAudioContext(); if(audioCtx.state==='suspended') audioCtx.resume(); els.audio.play().then(()=>updatePlayUI(true)).catch(()=>updatePlayUI(false)); }
        function updatePlayUI(p) {
            els.playIcon.className = p ? 'fas fa-pause' : 'fas fa-play';
            // 移动端封面播放浮层显示/隐藏
            const coverPlayOverlay = document.getElementById('cover-play-overlay');
            if (coverPlayOverlay) {
                if (p) {
                    coverPlayOverlay.classList.remove('show');
                } else if (window.innerWidth <= 768) {
                    // 只有在音频已加载且暂停时才显示浮层
                    if (isLoaded && els.audio.paused) {
                        coverPlayOverlay.classList.add('show');
                    }
                }
            }
        }

        let audioCtx, analyser, dataArray;

        function initAudioContext() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            const src = audioCtx.createMediaElementSource(els.audio);
            src.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        els.audio.ontimeupdate = () => {
            if(!els.audio.duration) return;
            const cur = els.audio.currentTime;
            const dur = els.audio.duration;
            els.progressFill.style.width = (cur/dur)*100 + '%';

            // 更新时间显示
            document.getElementById('curr-time').innerText = formatTime(cur);
            document.getElementById('total-time').innerText = formatTime(dur);

            if(currentLyrics.length) {
                const predict = cur + 0.25; let idx = -1;
                for(let i=0; i<currentLyrics.length; i++) { if(predict >= currentLyrics[i].time) idx = i; else break; }
                if(idx !== activeLyricIndex && idx !== -1) {
                    if(activeLyricIndex !== -1 && els.lyricsContainer.children[activeLyricIndex]) els.lyricsContainer.children[activeLyricIndex].classList.remove('active');
                    activeLyricIndex = idx;
                    const line = els.lyricsContainer.children[idx];
                    if(line) { line.classList.add('active'); line.scrollIntoView({ behavior: "smooth", block: "center" }); }
                }
            }
        };
        function nextTrack() { fetchMusic(true); }
        els.audio.onended = nextTrack; initTags(); fetchMusic(true);

        // 初始化后检查：如果音频没有自动播放（被浏览器阻止），显示播放浮层
        setTimeout(() => {
            if (window.innerWidth <= 768 && isLoaded && els.audio.paused) {
                const coverPlayOverlay = document.getElementById('cover-play-overlay');
                if (coverPlayOverlay) {
                    coverPlayOverlay.classList.add('show');
                }
            }
        }, 1500);

        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
